# Publish React + Vite component library to npm when a release is created

name: React Vite Component Library

on:
  release:
    types: [created]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      # Generate package.json dynamically for src/components
      - name: Generate package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "@${{ github.repository_owner }}/${{ github.event.repository.name }}",
            "version": "${{ github.event.release.tag_name }}",
            "description": "React + Vite component library",
            "main": "dist/index.umd.js",
            "module": "dist/index.es.js",
            "types": "dist/index.d.ts",
            "files": [
              "dist"
            ],
            "exports": {
              ".": {
                "import": "./dist/index.es.js",
                "require": "./dist/index.umd.js"
              },
              "./dist/style.css": "./dist/style.css"
            },
            "scripts": {
              "build": "vite build",
              "test": "echo \"No tests specified\" && exit 0"
            },
            "peerDependencies": {
              "react": "^18.0.0 || ^19.0.0",
              "react-dom": "^18.0.0 || ^19.0.0"
            },
            "devDependencies": {
              "@vitejs/plugin-react": "^4.3.0",
              "react": "^18.3.1",
              "react-dom": "^18.3.1",
              "vite": "^5.4.0",
              "glob": "^10.3.0"
            },
            "keywords": ["react", "vite", "components"],
            "license": "MIT"
          }
          EOF

      # Generate vite.config.js for library mode
      - name: Generate vite.config.js
        run: |
          cat > vite.config.js << 'EOF'
          import { defineConfig } from 'vite';
          import react from '@vitejs/plugin-react';
          import { resolve } from 'path';
          import { glob } from 'glob';

          const componentEntries = glob.sync('src/components/**/index.{js,jsx,ts,tsx}');

          const entries = {
            index: resolve(__dirname, 'src/components/index.js'),
          };

          componentEntries.forEach((entry) => {
            const name = entry.split('/').slice(-2, -1)[0];
            entries[name] = resolve(__dirname, entry);
          });

          export default defineConfig({
            plugins: [react()],
            build: {
              lib: {
                entry: entries,
                name: 'ComponentLibrary',
                formats: ['es', 'umd'],
                fileName: (format, entryName) => `${entryName}.${format}.js`,
              },
              rollupOptions: {
                external: ['react', 'react-dom', 'react/jsx-runtime'],
                output: {
                  globals: {
                    react: 'React',
                    'react-dom': 'ReactDOM',
                    'react/jsx-runtime': 'jsxRuntime',
                  },
                },
              },
            },
          });
          EOF

      # Generate barrel export file from src/components
      - name: Generate index.js barrel file
        run: |
          COMPONENTS_DIR="src/components"
          INDEX_FILE="$COMPONENTS_DIR/index.js"

          # Clear or create index file
          > "$INDEX_FILE"

          # Loop through each folder in src/components
          for dir in "$COMPONENTS_DIR"/*/; do
            if [ -d "$dir" ]; then
              COMPONENT_NAME=$(basename "$dir")
              # Skip if it's not a valid component folder
              if [ "$COMPONENT_NAME" != "index.js" ]; then
                echo "export { default as $COMPONENT_NAME } from './$COMPONENT_NAME';" >> "$INDEX_FILE"
                echo "export * from './$COMPONENT_NAME';" >> "$INDEX_FILE"
              fi
            fi
          done

          echo "===== Generated index.js ====="
          cat "$INDEX_FILE"

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
